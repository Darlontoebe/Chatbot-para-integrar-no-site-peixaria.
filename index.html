<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&Z Peixaria - Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <button class="chat-button" id="chatButton">
        <i class="fab fa-whatsapp"></i> Atendimento
    </button>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="header-content">
                <span class="avatar">🐟</span>
                <div>
                    <strong>Z&Z Peixaria</strong>
                    <p class="status">● Online • Responde rápido</p>
                </div>
            </div>
            <button class="close-btn" id="closeChat">✕</button>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
